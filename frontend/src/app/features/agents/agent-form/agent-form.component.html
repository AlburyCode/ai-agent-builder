<div class="form-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>{{ isEditMode ? 'Editar Agente' : 'Crear Agente' }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="name" placeholder="Nombre del agente" />
          <mat-error *ngIf="form.get('name')?.hasError('required')">El nombre es obligatorio</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Descripción</mat-label>
          <textarea
            matInput
            formControlName="description"
            cdkTextareaAutosize
            cdkAutosizeMinRows="3"
            placeholder="Descripción breve del agente">
          </textarea>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Instrucciones (System Prompt)</mat-label>
          <textarea
            matInput
            formControlName="instructions"
            rows="10"
            cdkTextareaAutosize
            cdkAutosizeMinRows="10"
            placeholder="Eres un asistente de atención al cliente de...">
          </textarea>
          <mat-hint>Define la personalidad y el comportamiento del agente. Este texto se envía a OpenAI como system prompt en cada conversación.</mat-hint>
        </mat-form-field>

        <mat-card-actions>
          <button mat-button type="button" routerLink="/agents">Cancelar</button>
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="form.invalid">
            Guardar
          </button>
        </mat-card-actions>

      </form>
    </mat-card-content>
  </mat-card>
</div>
