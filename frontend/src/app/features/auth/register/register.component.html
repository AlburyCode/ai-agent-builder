<div class="login-wrapper">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Crear cuenta</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" autocomplete="email" />
          <mat-error *ngIf="form.get('email')?.hasError('required')">El email es obligatorio</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Introduce un email válido</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Contraseña</mat-label>
          <input matInput formControlName="password" type="password" autocomplete="new-password" />
          <mat-error *ngIf="form.get('password')?.hasError('required')">La contraseña es obligatoria</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirmar contraseña</mat-label>
          <input matInput formControlName="confirmPassword" type="password" autocomplete="new-password" />
          <mat-error *ngIf="form.get('confirmPassword')?.hasError('required')">Confirma la contraseña</mat-error>
          <mat-error *ngIf="form.hasError('passwordMismatch') && form.get('confirmPassword')?.touched">
            Las contraseñas no coinciden
          </mat-error>
        </mat-form-field>

        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

        <mat-card-actions>
          <button
            mat-raised-button
            color="primary"
            type="submit"
            [disabled]="form.invalid || isLoading">
            {{ isLoading ? 'Registrando...' : 'Registrarse' }}
          </button>
          <a routerLink="/login" mat-button>¿Ya tienes cuenta? Inicia sesión</a>
        </mat-card-actions>
      </form>
    </mat-card-content>
  </mat-card>
</div>
